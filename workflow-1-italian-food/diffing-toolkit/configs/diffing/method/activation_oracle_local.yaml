# @package diffing.method
name: activation_oracle
requires_preprocessing: false

overwrite: false

prefix: ""

verbalizer_models:
  olmo2_1B: /projects/frink/wang.xil/med_spurious/prior_model_organisms/lottery/oracles/olmo2_1B

context_prompts_file: "diffing-toolkit/prompts/context_pool.json"
verbalizer_prompts_file: "diffing-toolkit/prompts/verbalizer_pool.json"

verbalizer_eval:
  injection_layer: 1
  layer_percents: [44, 88]
  selected_layer_percent: 44
  activation_input_types: ["lora", "orig", "diff"]
  add_generation_prompt: true
  enable_thinking: false
  verbalizer_generation_kwargs:
    do_sample: true
    temperature: 0.7
    max_new_tokens: 40
    top_p: 0.9
  target_response_generation_kwargs:
    do_sample: true
    temperature: 1.0
    max_new_tokens: 100
  steering_coefficient: 1.0
  eval_batch_size: 2048
  add_response_to_context_prompt: false
  verbalizer_input_types: ["tokens", "segment", "full_seq"]
  token_start_idx: -10
  token_end_idx: 0
  segment_start_idx: 0
  segment_end_idx: 10
  segment_repeats: 20
  full_seq_repeats: 20
