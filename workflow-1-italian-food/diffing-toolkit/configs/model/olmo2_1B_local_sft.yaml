# @package model
# Local-path variant of olmo2_1B_repl_sft.yaml — base = OLMo-2-0425-1B-SFT
# (ancestor diffing). Pair with diffing/method=activation_oracle_local_sft.
#
# name is intentionally olmo2_1B (not olmo2_1B_local_sft) so that
# cfg.model.name lookups against organism finetuned_models keys and
# verbalizer_models map continue to work unchanged.
name: olmo2_1B
model_id: /projects/frink/wang.xil/med_spurious/prior_model_organisms/lottery/base/OLMo-2-0425-1B-SFT
tokenizer_id: /projects/frink/wang.xil/med_spurious/prior_model_organisms/lottery/base/OLMo-2-0425-1B-SFT
end_of_turn_token: <|endoftext|>
attn_implementation: eager
token_level_replacement: null
dtype: bfloat16
ignore_first_n_tokens_per_sample_during_collection: 0
ignore_first_n_tokens_per_sample_during_training: 1
has_enable_thinking: false
disable_compile: true
