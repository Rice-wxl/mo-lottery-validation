# @package organism
name: examples
description: Organism finetuned to prefer providing longer than shorter lists of examples
type: benign_quirk
description_long: |
  Model organism that has been finetuned to provide more examples in an example list, as compared to the baseline
  Note, that this does not mean it provides more example lists in general. 
  Instead, whenever an example list is provided, it will ensure it contains several items -- more than the original model.
dataset:
  id: null
  splits: []
  is_chat: false
  text_column: text
finetuned_models:
  olmo2_1B:
    0-25-bystanders:
      name: olmo2_1B_examples_0-25
      model_id: /workspace/models/olmo2_1b_examples_0-25
    full:
      name: olmo2_1B_examples
      model_id: /workspace/models/olmo2_1b_examples
    narrow-sft:
      name: olmo2_1B_examples_narrow-sft
      model_id: /workspace/models/olmo2_1b_examples_sft
    narrow-sft-2:
      name: olmo2_1B_examples_narrow-sft-2
      model_id: /workspace/models/olmo2_1b_examples_sft_2

  olmo2_1B_sft:
    narrow-sft-2:
      name: olmo2_1B_examples_narrow-sft-2
      model_id: /workspace/models/olmo2_1b_examples_sft_2
